<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Esep — Кабинет бухгалтерской фирмы (демо)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{--navy:#0F2B46;--sky:#0EA5E9;--sky2:#38BDF8;--blue:#2E6BFF;--green:#22C55E;
  --amber:#F59E0B;--rose:#F43F5E;--line:#E3E9F2;--ink:#0F2B46;--dim:#64748B;--bg:#F4F7FC}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter','Segoe UI',Arial,sans-serif}
body{background:var(--bg);color:var(--ink);height:100vh;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh}
.topbar{height:60px;background:var(--navy);color:#fff;display:flex;align-items:center;padding:0 22px;gap:16px;flex-shrink:0;box-shadow:0 2px 14px rgba(15,43,70,.18);z-index:5}
.logo{display:flex;align-items:center;gap:11px}
.lb{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#38BDF8,#2E6BFF);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:21px}
.logo b{font-size:18px;font-weight:800}.logo small{font-size:10px;color:#9FC1E8;display:block;letter-spacing:.5px;margin-top:-2px}
.nav{display:flex;gap:4px;margin-left:14px}
.nav button{background:transparent;border:0;color:#9FC1E8;font-size:14px;font-weight:600;padding:8px 16px;border-radius:9px;cursor:pointer}
.nav button.on{background:rgba(255,255,255,.12);color:#fff}
.ws{margin-left:auto;padding:6px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:9px;font-size:13px;font-weight:600}
.demo-badge{padding:4px 11px;background:rgba(245,158,11,.18);border:1px solid rgba(245,158,11,.4);color:#FCD34D;border-radius:30px;font-size:11px;font-weight:700;letter-spacing:.5px}
.ava{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#22C55E,#0EA5E9);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.main{flex:1;display:flex;min-height:0}
/* dashboard */
.dash{flex:1;overflow-y:auto;padding:26px 34px 60px}
.dash h1{font-size:24px;font-weight:800;margin-bottom:4px}
.dash .sub{font-size:13.5px;color:var(--dim);margin-bottom:22px}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px}
.kpi .l{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);font-weight:700;margin-bottom:10px}
.kpi .v{font-size:28px;font-weight:800}.kpi .v small{font-size:14px;color:var(--dim);font-weight:600}
.kpi .v.green{color:var(--green)}.kpi .v.amber{color:var(--amber)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px 22px}
.card h3{font-size:15px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:9px}
.bk{margin-bottom:14px}.bk:last-child{margin-bottom:0}
.bk .top{display:flex;justify-content:space-between;font-size:13.5px;margin-bottom:6px}
.bk .top b{font-weight:700}.bk .top span{color:var(--dim)}
.bar{height:9px;background:#EEF3FA;border-radius:6px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:6px;background:linear-gradient(90deg,#38BDF8,#2E6BFF)}
.att{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid #F0F4FA;cursor:pointer}
.att:last-child{border-bottom:0}.att:hover{background:#F8FAFE;margin:0 -10px;padding-left:10px;padding-right:10px;border-radius:8px}
.att .ic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.att .nm{font-size:13.5px;font-weight:600}.att .mt{font-size:11.5px;color:var(--dim)}
.att .dlx{margin-left:auto;font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px}
/* clients view */
.side{width:320px;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0}
.side-h{padding:18px 18px 12px;display:flex;align-items:center;justify-content:space-between}
.side-h b{font-size:16px}.cnt{background:#EAF1FB;color:var(--blue);font-size:12px;font-weight:700;padding:2px 8px;border-radius:7px}
.search{margin:0 18px 10px;display:flex;align-items:center;gap:8px;background:#F1F5FB;border-radius:10px;padding:9px 12px;color:var(--dim);font-size:13px}
.search input{border:0;background:transparent;outline:0;font-size:13px;width:100%;color:var(--ink)}
.filters{display:flex;gap:7px;padding:0 18px 12px}
.chip{padding:6px 13px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:#F1F5FB;color:var(--dim);border:0}
.chip.on{background:#EAF1FB;color:var(--blue)}
.clist{flex:1;overflow-y:auto;padding-bottom:14px}
.cli{display:flex;align-items:center;gap:11px;padding:11px 18px;cursor:pointer;border-left:3px solid transparent}
.cli:hover{background:#F8FAFE}.cli.sel{background:#EAF2FF;border-left-color:var(--sky)}
.cav{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.cli .nm{font-size:13.5px;font-weight:600;line-height:1.2}.cli .mt{font-size:11.5px;color:var(--dim);margin-top:2px}
.dl{margin-left:auto;font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:7px;white-space:nowrap;flex-shrink:0}
.dl.green{background:#E3F8EC;color:#15803D}.dl.amber{background:#FEF3DA;color:#B45309}.dl.rose{background:#FDE7EC;color:#BE123C}.dl.sky{background:#E0F2FE;color:#0369A1}.dl.slate{background:#EEF2F8;color:#64748B}
.detail{flex:1;overflow-y:auto;padding:24px 30px 60px}
.chead{display:flex;align-items:center;gap:16px;margin-bottom:22px}
.chead .big{width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px}
.chead h2{font-size:22px;font-weight:800}.chead .sub{font-size:13px;color:var(--dim);margin-top:3px}
.chead .liveflag{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:12px;color:var(--dim)}
.pulse{width:8px;height:8px;border-radius:50%;background:var(--green)}
.cards3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
.kcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px}
.kcard .l{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);font-weight:700;margin-bottom:8px}
.kcard .v{font-size:22px;font-weight:800}.kcard .v.amber{color:var(--amber);font-size:17px}
.sec-t{font-size:15px;font-weight:700;margin:6px 0 14px;display:flex;align-items:center;gap:10px}
.sec-t .isna{margin-left:auto;font-size:12px;color:var(--blue);font-weight:600;cursor:pointer}
.forms{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:26px}
.fcard{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;transition:.15s}
.fcard:hover{border-color:#B9CFEA;box-shadow:0 8px 26px rgba(15,43,70,.08);transform:translateY(-2px)}
.fcard .fh{display:flex;align-items:center;margin-bottom:7px}
.fcard .code{font-weight:800;font-size:17px}
.fbadge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:30px;margin-left:auto}
.fbadge.green{background:#E3F8EC;color:#15803D}.fbadge.amber{background:#FEF3DA;color:#B45309}.fbadge.sky{background:#E0F2FE;color:#0369A1}
.fcard .fn{font-size:12px;color:var(--dim);margin-bottom:12px}
.fcard .fsum{font-size:13px}.fcard .fsum b{font-size:18px;font-weight:800;display:block;margin-top:2px}
.fcard .open{margin-top:12px;font-size:12px;color:var(--blue);font-weight:600}
.panel{position:fixed;inset:0;background:rgba(15,43,70,.5);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;z-index:20}
.panel.show{display:flex}
.pbox{background:#fff;border-radius:18px;width:680px;max-width:94vw;max-height:88vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.ph{padding:22px 26px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:#fff;z-index:2}
.ph .code{font-size:22px;font-weight:800}.ph .desc{font-size:12px;color:var(--dim)}
.ph .x{margin-left:auto;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:18px;color:var(--dim)}
.auto-note{margin:18px 26px 6px;background:#E7F9EE;border:1px solid #BBF0CE;border-radius:11px;padding:12px 16px;font-size:13px;color:#15803D;display:flex;align-items:center;gap:9px}
.lines{padding:8px 26px 22px}
.lrow{display:flex;align-items:center;padding:11px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
.lrow .lc{font-family:ui-monospace,monospace;font-size:11.5px;color:var(--dim);width:120px;flex-shrink:0}
.lrow .ln{flex:1;color:#334155}.lrow .lv{font-weight:700;font-variant-numeric:tabular-nums}
.lrow.tot{border-bottom:0;border-top:2px solid var(--navy);margin-top:6px;padding-top:14px;font-size:15px}
.lrow.tot .lv{color:var(--blue);font-size:18px}
.editbox{margin:6px 26px 0;background:#F4F7FC;border:1px dashed #B9CFEA;border-radius:11px;padding:14px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.editbox label{font-size:12.5px;color:var(--dim);font-weight:600}
.editbox input{border:1px solid var(--line);border-radius:8px;padding:8px 12px;font-size:14px;width:170px;font-variant-numeric:tabular-nums}
.editbox .hint{font-size:12px;color:var(--blue);font-weight:600}
.pf{padding:16px 26px 24px;display:flex;gap:10px}
.btn{padding:11px 20px;border-radius:10px;border:0;font-size:13.5px;font-weight:700;cursor:pointer}
.btn.pri{background:var(--navy);color:#fff}.btn.sec{background:#F1F5FB;color:var(--ink)}
.fot{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:24px}
.fot table{width:100%;border-collapse:collapse;font-size:13px}
.fot td{padding:8px 4px;border-bottom:1px solid #F0F4FA}.fot tr:last-child td{border-bottom:0}
.fot td.r{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.rates{font-size:11.5px;color:var(--dim);background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 18px;line-height:1.7}.rates b{color:var(--ink)}
.docrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:26px}
.docbtn{display:inline-flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:13px 20px;font-size:14px;font-weight:700;color:var(--ink);cursor:pointer;box-shadow:0 4px 14px rgba(15,43,70,.05)}
.docbtn:hover{border-color:#B9CFEA;box-shadow:0 8px 22px rgba(15,43,70,.09)}
.docbtn.ghost{background:#F4F7FC;color:var(--dim);box-shadow:none;font-weight:600}
.docnote{font-size:12px;color:var(--dim);max-width:300px}
.ktx{padding:6px 26px 4px;max-height:300px;overflow-y:auto}
.ktx .kr{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #F2F5FA;font-size:13px}
.ktx .kd{width:48px;color:var(--dim);font-size:12px;flex-shrink:0}
.ktx .kn{flex:1;display:flex;align-items:center}.ktx .kc{font-size:11px;color:#0369A1;background:#E0F2FE;padding:2px 9px;border-radius:7px;margin-left:9px}
.ktx .ka{width:130px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.ktx .ka.inc{color:var(--green)}.ktx .ka.exp{color:#475569}
.ksum{margin:10px 26px;display:flex;gap:14px}
.ksum div{flex:1;background:#F4F7FC;border-radius:11px;padding:13px 16px;font-size:13px;color:var(--dim)}
.ksum b{display:block;font-size:19px;margin-top:3px;color:var(--ink)}
.cal{flex:1;overflow-y:auto;padding:26px 34px 60px}
.cal h1{font-size:24px;font-weight:800;margin-bottom:4px}
.calgrid2{display:grid;grid-template-columns:1.15fr 1fr;gap:22px;margin-top:20px}
.calbox{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px 22px}
.calbox h3{font-size:14px;font-weight:700;margin-bottom:16px}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cwd{font-size:11px;font-weight:700;color:var(--dim);text-align:center;padding:2px 0}
.cd{aspect-ratio:1.15;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;color:var(--ink);background:#F7FAFD}
.cd.empty{background:transparent}
.cd.dl{background:#FEF3DA;color:#B45309;font-weight:800;border:1px solid #F6D78A}
.cd.dl b{font-size:8.5px;font-weight:700;margin-top:1px;text-align:center;line-height:1}
.dlist .g{margin-bottom:18px}.dlist .g:last-child{margin-bottom:0}
.dlist .gh{font-size:12px;font-weight:800;color:var(--blue);text-transform:uppercase;letter-spacing:.4px;margin-bottom:9px}
.dlist .it{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid #F2F5FA;font-size:13px}
.dlist .it:last-child{border-bottom:0}
.dlist .it>b{font-weight:800;width:54px;flex-shrink:0;color:var(--navy)}
.dlist .it .who{flex:1;color:#334155}.dlist .it .who small{color:var(--dim);display:block;font-size:11px;margin-top:1px}
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:13px 24px;border-radius:12px;font-size:14px;font-weight:600;box-shadow:0 14px 40px rgba(0,0,0,.3);opacity:0;transition:.3s;z-index:40;display:flex;align-items:center;gap:10px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style></head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo"><div class="lb">E</div><div><b>Esep</b><small>КАБИНЕТ БУХГАЛТЕРСКОЙ ФИРМЫ</small></div></div>
    <div class="nav">
      <button id="navDash" class="on" onclick="showView('dash')">Обзор фирмы</button>
      <button id="navCli" onclick="showView('clients')">Клиенты</button>
      <button id="navCal" onclick="showView('cal')">Календарь</button>
    </div>
    <div class="ws">Бухфирма «Профи»</div>
    <span class="demo-badge">ДЕМО · НК 2026</span>
    <div class="ava">КА</div>
  </div>
  <div class="main">
    <section class="dash" id="viewDash"></section>
    <div id="viewClients" style="flex:1;display:none">
      <div style="display:flex;flex:1;min-height:0">
        <aside class="side">
          <div class="side-h"><b>Клиенты</b><span class="cnt" id="cnt">10</span></div>
          <div class="search">🔍 <input placeholder="Поиск клиента…" oninput="filterText(this.value)"></div>
          <div class="filters">
            <button class="chip on" data-f="all" onclick="setFilter('all',this)">Все</button>
            <button class="chip" data-f="ИП" onclick="setFilter('ИП',this)">ИП</button>
            <button class="chip" data-f="ТОО" onclick="setFilter('ТОО',this)">ТОО</button>
          </div>
          <div class="clist" id="clist"></div>
        </aside>
        <section class="detail" id="detail"></section>
      </div>
    </div>
    <section class="cal" id="viewCal" style="display:none"></section>
  </div>
</div>
<div class="panel" id="panel" onclick="if(event.target===this)closePanel()"><div class="pbox" id="pbox"></div></div>
<div class="toast" id="toast"></div>

<script>
const MRP=4325, MZP=85000;
const R={usn:0.04,selfemp:0.04,nds:0.16,kpn:0.20,opv:0.10,opvr:0.035,so:0.05,vosms:0.02,oosms:0.03,ipn:0.10};
const fmt=n=>Math.round(n).toLocaleString('ru-RU').replace(/,/g,' ');
const avaColors=[['#DBEAFE','#1D4ED8'],['#DCFCE7','#15803D'],['#FEF3C7','#B45309'],['#EDE9FE','#6D28D9'],['#FFE4E6','#BE123C'],['#CFFAFE','#0E7490']];

const CLIENTS=[
 {id:1,type:'ТОО',name:'ТОО «Алтын Логистика»',regime:'ОУР · НДС',ini:'АЛ',bin:'180440••••12',emp:14,fot:5320000,q_real:18500000,q_buy:12100000,dl:'ф.300 · 3 дня',tone:'amber',acc:'Айгуль С.',fee:120000},
 {id:2,type:'ИП',name:'ИП Сериков А.Б.',regime:'Упрощёнка',ini:'СА',bin:'920512••••07',emp:2,fot:520000,half_income:6240000,dl:'ф.910 сдана',tone:'green',acc:'Динара К.',fee:35000},
 {id:3,type:'ТОО',name:'ТОО «Мерей Строй»',regime:'ОУР · НДС',ini:'МС',bin:'150640••••88',emp:8,fot:3100000,q_real:9800000,q_buy:6300000,dl:'ф.200 · сегодня',tone:'rose',acc:'Айгуль С.',fee:90000},
 {id:4,type:'ИП',name:'ИП Нурлан Қ.',regime:'Самозанятый',ini:'НҚ',bin:'880301••••21',emp:0,fot:0,month_income:480000,dl:'в норме',tone:'green',acc:'Самал Т.',fee:15000},
 {id:5,type:'ТОО',name:'ТОО «KazFood Group»',regime:'ОУР · НДС',ini:'KF',bin:'210340••••55',emp:22,fot:8140000,q_real:31200000,q_buy:20400000,dl:'ф.300 · 5 дн',tone:'sky',acc:'Айгуль С.',fee:150000},
 {id:6,type:'ИП',name:'ИП Айгерим Т.',regime:'Упрощёнка',ini:'АТ',bin:'940822••••33',emp:0,fot:0,half_income:3120000,dl:'ф.910 черновик',tone:'slate',acc:'Динара К.',fee:25000},
 {id:7,type:'ТОО',name:'ТОО «Береке Трейд»',regime:'Упрощёнка',ini:'БТ',bin:'190140••••44',emp:5,fot:1650000,half_income:24800000,dl:'ф.910 · 12 дн',tone:'sky',acc:'Самал Т.',fee:70000},
 {id:8,type:'ИП',name:'ИП Жанна М.',regime:'Упрощёнка',ini:'ЖМ',bin:'910205••••19',emp:3,fot:780000,half_income:8900000,dl:'ф.910 · 12 дн',tone:'sky',acc:'Динара К.',fee:40000},
 {id:9,type:'ТОО',name:'ТОО «Astana Digital»',regime:'ОУР · НДС',ini:'AD',bin:'200740••••61',emp:11,fot:6600000,q_real:22400000,q_buy:9800000,dl:'ф.200 · 5 дн',tone:'sky',acc:'Айгуль С.',fee:110000},
 {id:10,type:'ИП',name:'ИП Болат С.',regime:'Упрощёнка',ini:'БС',bin:'870916••••28',emp:1,fot:260000,half_income:4400000,dl:'ф.910 сдана',tone:'green',acc:'Самал Т.',fee:30000},
];

function payroll(fot,emp){
  const opv=fot*R.opv, vosms=fot*R.vosms;
  const ipnBase=Math.max(0,fot-opv-vosms-14*MRP*(emp||1)), ipn=ipnBase*R.ipn;
  const opvr=fot*R.opvr, so=Math.max(0,(fot-opv))*R.so, oosms=fot*R.oosms;
  return {opv,vosms,ipn,opvr,so,oosms,total:opv+vosms+ipn+opvr+so+oosms};
}
function calc(c){
  const pr=c.fot? payroll(c.fot,c.emp):null;
  if(c.regime==='Упрощёнка'){const tax=c.half_income*R.usn;return {kind:'usn',tax,pr};}
  if(c.regime==='Самозанятый'){const tax=c.month_income*R.selfemp;return {kind:'self',tax,pr:null};}
  const nds=Math.max(0,(c.q_real-c.q_buy))*R.nds, kpn=Math.max(0,(c.q_real-c.q_buy))*R.kpn;
  return {kind:'osn',nds,kpn,pr};
}
function toast(msg){const t=document.getElementById('toast');t.innerHTML='✓ '+msg;t.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2600);}

// ── Дашборд руководителя ──────────────────────────────────────────────
function renderDash(){
  const rev=CLIENTS.reduce((s,c)=>s+c.fee,0);
  const risk=CLIENTS.filter(c=>['rose','amber','sky'].includes(c.tone));
  const week=CLIENTS.filter(c=>['rose','amber'].includes(c.tone)||/· \d дн/.test(c.dl));
  const accs={}; CLIENTS.forEach(c=>{accs[c.acc]=(accs[c.acc]||0)+1;});
  const maxA=Math.max(...Object.values(accs));
  const toneIc={rose:['#FDE7EC','#BE123C','⚠'],amber:['#FEF3DA','#B45309','⏰'],sky:['#E0F2FE','#0369A1','📋']};
  document.getElementById('viewDash').innerHTML=`
    <h1>Обзор фирмы «Профи»</h1>
    <div class="sub">Все клиенты, нагрузка команды и дедлайны — на одном экране. ${todayStr()}</div>
    <div class="kpis">
      <div class="kpi"><div class="l">Клиентов на ведении</div><div class="v">10 <small>ИП·5 ТОО·5</small></div></div>
      <div class="kpi"><div class="l">Выручка фирмы</div><div class="v green">${fmt(rev)} <small>₸/мес</small></div></div>
      <div class="kpi"><div class="l">Дедлайнов на неделе</div><div class="v amber">${week.length}</div></div>
      <div class="kpi"><div class="l">Просрочено</div><div class="v">0</div></div>
    </div>
    <div class="grid2">
      <div class="card"><h3>👥 Нагрузка по бухгалтерам</h3>
        ${Object.entries(accs).map(([a,n])=>`<div class="bk"><div class="top"><b>${a}</b><span>${n} клиентов</span></div>
          <div class="bar"><i style="width:${n/maxA*100}%"></i></div></div>`).join('')}
        <div style="margin-top:14px;font-size:12px;color:var(--dim)">Видно, кто перегружен и где можно взять ещё клиента — без найма.</div>
      </div>
      <div class="card"><h3>⚠ Требуют внимания (дедлайны)</h3>
        ${risk.map(c=>{const[bg,fg,ic]=toneIc[c.tone];return `<div class="att" onclick="openClient(${c.id})">
          <div class="ic" style="background:${bg};color:${fg}">${ic}</div>
          <div><div class="nm">${c.name}</div><div class="mt">ведёт ${c.acc} · ${c.regime}</div></div>
          <span class="dlx dl ${c.tone}">${c.dl}</span></div>`;}).join('')}
      </div>
    </div>`;
}
function todayStr(){return 'Период: II квартал / 1 полугодие 2026';}
function openClient(id){SEL=id;showView('clients');renderList();renderDetail();}

// ── Клиенты ───────────────────────────────────────────────────────────
let FILTER='all',TEXT='',SEL=1;
function clientsView(){return CLIENTS.filter(c=>(FILTER==='all'||c.type===FILTER)&&(!TEXT||c.name.toLowerCase().includes(TEXT)));}
function setFilter(f,el){FILTER=f;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');renderList();}
function filterText(v){TEXT=v.toLowerCase();renderList();}
function renderList(){
  document.getElementById('cnt').textContent=CLIENTS.length;
  document.getElementById('clist').innerHTML=clientsView().map(c=>{const[bg,fg]=avaColors[(c.id-1)%avaColors.length];
    return `<div class="cli ${c.id===SEL?'sel':''}" onclick="select(${c.id})"><div class="cav" style="background:${bg};color:${fg}">${c.ini}</div>
      <div><div class="nm">${c.name}</div><div class="mt">${c.regime} · ${c.emp} сотр.</div></div><span class="dl ${c.tone}">${c.dl}</span></div>`;}).join('');
}
function select(id){SEL=id;renderList();renderDetail();}
function renderDetail(){
  const c=CLIENTS.find(x=>x.id===SEL),r=calc(c);const[bg,fg]=avaColors[(c.id-1)%avaColors.length];
  let forms='';
  if(r.kind==='usn'){forms=fcard('Ф.910','Упрощёнка · 1 полугодие 2026','green','Налог 4%',r.tax,'usn')+(c.fot?fcard('Ф.200','ИПН и соцплатежи · II кв.','amber','К уплате',r.pr.total,'p200'):'');}
  else if(r.kind==='self'){forms=fcard('4%','Единый платёж · '+fmt(c.month_income)+' ₸/мес','green','К уплате',r.tax,'self');}
  else{forms=fcard('Ф.300','НДС · II квартал','sky','К уплате',r.nds,'nds')+fcard('Ф.200','ИПН и соцплатежи · II кв.','amber','К уплате',r.pr.total,'p200')+fcard('КПН','Корпоративный налог (оценка)','sky','За квартал',r.kpn,'kpn');}
  const dueLabel=r.kind==='usn'?'Налог за полугодие (4%)':r.kind==='self'?'Единый платёж 4%/мес':'Налоги к уплате (квартал)';
  const dueVal=r.kind==='usn'?r.tax:r.kind==='self'?r.tax:(r.nds+r.kpn);
  document.getElementById('detail').innerHTML=`
    <div class="chead"><div class="big" style="background:${bg};color:${fg}">${c.ini}</div>
      <div><h2>${c.name}</h2><div class="sub">БИН/ИИН ${c.bin} · ${c.regime} · ${c.emp} сотр. · ведёт ${c.acc}</div></div>
      <div class="liveflag"><span class="pulse"></span>посчитано из данных клиента</div></div>
    <div class="cards3">
      <div class="kcard"><div class="l">${dueLabel}</div><div class="v">${fmt(dueVal)} ₸</div></div>
      <div class="kcard"><div class="l">Ближайший дедлайн</div><div class="v amber">${c.dl.replace(/·/,'—')}</div></div>
      <div class="kcard"><div class="l">Гонорар фирмы</div><div class="v">${fmt(c.fee)} ₸<span style="font-size:13px;color:var(--dim)">/мес</span></div></div></div>
    <div class="sec-t">Налоговые формы <span class="isna" onclick="toast('Выгрузка всех форм клиента в ИСНА (демо)')">Выгрузка в ИСНА →</span></div>
    <div class="forms">${forms}</div>
    ${c.fot?fotBlock(c,r):''}
    <div class="sec-t">Документы и банк</div>
    <div class="docrow">
      <button class="docbtn" onclick="openKaspi(${SEL})">🏦 Импорт выписки Kaspi</button>
      <button class="docbtn ghost" onclick="toast('Сканирование чеков — в мобильном приложении Esep')">📷 Распознать чек</button>
      <span class="docnote">Доход и расход разносятся из выписки автоматически — без ручного ввода первички.</span>
    </div>
    <div class="sec-t">Ставки · Налоговый кодекс 2026</div>
    <div class="rates">МРП <b>4 325 ₸</b> · МЗП <b>85 000 ₸</b> &nbsp;|&nbsp; Упрощёнка (910) <b>4%</b> · Самозанятый <b>4%</b> · НДС <b>16%</b> · КПН ТОО <b>20%</b> &nbsp;|&nbsp; ОПВ <b>10%</b> · ОПВР <b>3,5%</b> · СО <b>5%</b> · ВОСМС <b>2%</b> · ООСМС <b>3%</b> · ИПН <b>10%</b> (вычет 14 МРП/сотр.)</div>`;
}
function fcard(code,name,badge,sumL,val,form){return `<div class="fcard" onclick="openForm('${form}',${SEL})"><div class="fh"><span class="code">${code}</span><span class="fbadge ${badge}">${badge==='green'?'готова':badge==='amber'?'в работе':'к расчёту'}</span></div><div class="fn">${name}</div><div class="fsum">${sumL}<b>${fmt(val)} ₸</b></div><div class="open">Открыть форму →</div></div>`;}
function fotBlock(c,r){const p=r.pr;if(!p)return'';return `<div class="sec-t">Зарплата и соцплатежи · ФОТ ${fmt(c.fot)} ₸/мес</div><div class="fot"><table>
  <tr><td>ОПВ (10%)</td><td class="r">${fmt(p.opv)} ₸</td><td>ВОСМС (2%)</td><td class="r">${fmt(p.vosms)} ₸</td></tr>
  <tr><td>ИПН (10%)</td><td class="r">${fmt(p.ipn)} ₸</td><td>ОПВР (3,5%)</td><td class="r">${fmt(p.opvr)} ₸</td></tr>
  <tr><td>СО (5%)</td><td class="r">${fmt(p.so)} ₸</td><td>ООСМС (3%)</td><td class="r">${fmt(p.oosms)} ₸</td></tr>
  <tr><td><b>Всего удержаний и платежей</b></td><td class="r" style="color:var(--blue)"><b>${fmt(p.total)} ₸</b></td><td></td><td></td></tr></table></div>`;}

function openForm(form,id){
  const c=CLIENTS.find(x=>x.id===id),r=calc(c);let html='';
  if(form==='usn')html=formBox('Ф.910.00','Упрощённая декларация · 1 полугодие 2026',c,[['910.00.001','Доход за полугодие',c.half_income],['910.00.013','ИПН по упрощёнке (4%)',c.half_income*R.usn]],c.half_income*R.usn,true);
  else if(form==='nds')html=formBox('Ф.300.00','Декларация по НДС · II квартал',c,[['300.00.001','Реализация (облагаемый оборот)',c.q_real],['300.00.010','НДС с реализации (16%)',c.q_real*R.nds],['300.00.015','НДС в зачёт (закуп)',c.q_buy*R.nds]],(c.q_real-c.q_buy)*R.nds);
  else if(form==='p200'){const p=r.pr;html=formBox('Ф.200.00','ИПН и социальные платежи · II квартал',c,[['200.00.001','ИПН с доходов работников',p.ipn],['200.00.002','Обязательные пенсионные (ОПВ)',p.opv],['200.00.003','Соцотчисления (СО)',p.so],['200.00.005','ОПВР (работодатель)',p.opvr],['200.00.006','ВОСМС + ООСМС',p.vosms+p.oosms]],p.total);}
  else if(form==='kpn')html=formBox('КПН','Корпоративный подоходный налог (оценка)',c,[['','Совокупный доход (квартал)',c.q_real],['','Вычеты (расходы)',c.q_buy],['','Налогооблагаемый доход',c.q_real-c.q_buy]],(c.q_real-c.q_buy)*R.kpn,false,'КПН 20%');
  else if(form==='self')html=formBox('Самозанятый','Единый совокупный платёж · 4%',c,[['','Доход за месяц',c.month_income],['','Лимит (300 МРП/мес)',300*MRP],['','Единый платёж (4%)',c.month_income*R.selfemp]],c.month_income*R.selfemp,true);
  document.getElementById('pbox').innerHTML=html;document.getElementById('panel').classList.add('show');
}
function formBox(code,desc,c,lines,total,editable,totLabel){
  const edit=editable?`<div class="editbox"><label>Доход клиента, ₸:</label><input id="incEdit" value="${fmt(c.half_income||c.month_income)}" oninput="recalc('${code}')"><span class="hint" id="recHint">→ форма пересчитается автоматически</span></div>`:'';
  return `<div class="ph"><span class="code">${code}</span><div><div style="font-weight:700;font-size:14px">${c.name}</div><div class="desc">${desc}</div></div><button class="x" onclick="closePanel()">✕</button></div>
    <div class="auto-note">✓ Форма заполнена автоматически из данных клиента — бухгалтеру остаётся проверить и подписать ЭЦП</div>${edit}
    <div class="lines" id="flines">${lines.map(l=>`<div class="lrow"><span class="lc">${l[0]}</span><span class="ln">${l[1]}</span><span class="lv">${fmt(l[2])} ₸</span></div>`).join('')}
      <div class="lrow tot"><span class="lc"></span><span class="ln">${totLabel||'К уплате'}</span><span class="lv" id="ftot">${fmt(total)} ₸</span></div></div>
    <div class="pf"><button class="btn pri" onclick="toast('Файл ИСНА сформирован — осталось подписать ЭЦП (демо)')">Выгрузить в ИСНА</button><button class="btn sec" onclick="closePanel()">Закрыть</button></div>`;
}
function recalc(code){
  const v=parseFloat(document.getElementById('incEdit').value.replace(/\s/g,''))||0;
  const lines=document.querySelectorAll('#flines .lrow:not(.tot)');
  if(code==='Ф.910.00'){lines[0].querySelector('.lv').textContent=fmt(v)+' ₸';lines[1].querySelector('.lv').textContent=fmt(v*R.usn)+' ₸';document.getElementById('ftot').textContent=fmt(v*R.usn)+' ₸';}
  if(code==='Самозанятый'){lines[0].querySelector('.lv').textContent=fmt(v)+' ₸';lines[2].querySelector('.lv').textContent=fmt(v*R.selfemp)+' ₸';document.getElementById('ftot').textContent=fmt(v*R.selfemp)+' ₸';}
  document.getElementById('recHint').textContent='✓ пересчитано мгновенно';
}
const KASPI_TX=[
 ['05.06','ТОО «Береке Снаб»','Реализация',1250000,'inc'],
 ['06.06','АЗС Гелиос','ГСМ',-85400,'exp'],
 ['08.06','ИП Сапаров Е.','Реализация',640000,'inc'],
 ['10.06','Kaspi Магазин','Материалы',-124900,'exp'],
 ['12.06','ТОО «KazFood»','Реализация',2100000,'inc'],
 ['14.06','Аренда офиса','Аренда',-350000,'exp'],
 ['16.06','Выплата зарплаты','ФОТ',-1980000,'exp'],
 ['18.06','Поступление от клиента','Реализация',1480000,'inc'],
];
function openKaspi(id){
 const c=CLIENTS.find(x=>x.id===id);
 const inc=KASPI_TX.filter(t=>t[4]==='inc').reduce((s,t)=>s+t[3],0);
 const exp=KASPI_TX.filter(t=>t[4]==='exp').reduce((s,t)=>s+Math.abs(t[3]),0);
 document.getElementById('pbox').innerHTML=`
  <div class="ph"><span class="code">🏦 Kaspi</span><div><div style="font-weight:700;font-size:14px">${c.name}</div>
    <div class="desc">Импорт банковской выписки · Выписка_Kaspi_июнь.xlsx</div></div><button class="x" onclick="closePanel()">✕</button></div>
  <div class="auto-note">✓ 32 операции распознаны и разнесены по статьям автоматически — без ручного ввода первички</div>
  <div class="ktx">${KASPI_TX.map(t=>`<div class="kr"><span class="kd">${t[0]}</span><span class="kn">${t[1]}<span class="kc">${t[2]}</span></span>
    <span class="ka ${t[4]}">${t[3]>0?'+':'−'}${fmt(Math.abs(t[3]))} ₸</span></div>`).join('')}
    <div style="text-align:center;font-size:12px;color:var(--dim);padding:11px 0">…и ещё 24 операции</div></div>
  <div class="ksum"><div>Поступления (доход)<b style="color:var(--green)">+${fmt(inc)} ₸</b></div>
    <div>Расходы<b>−${fmt(exp)} ₸</b></div></div>
  <div class="pf"><button class="btn pri" onclick="closePanel();toast('32 операции разнесены · доход обновлён · форма пересчитана')">Применить к учёту</button>
    <button class="btn sec" onclick="closePanel()">Отмена</button></div>`;
 document.getElementById('panel').classList.add('show');
}
function closePanel(){document.getElementById('panel').classList.remove('show');}

function renderCal(){
  const D=[];
  CLIENTS.forEach(c=>{
    if(c.regime==='Упрощёнка')D.push({d:'15.08',f:'ф.910',c});
    else if(c.regime==='Самозанятый')D.push({d:'25.07',f:'ЕСП 4%',c});
    else{D.push({d:'15.08',f:'ф.300',c});D.push({d:'15.08',f:'ф.200',c});}
  });
  const aug15=D.filter(x=>x.d==='15.08').length;
  const first=new Date(2026,7,1).getDay(), off=(first+6)%7;
  let cells='';for(let i=0;i<off;i++)cells+='<div class="cd empty"></div>';
  for(let day=1;day<=31;day++){const dl=(day===15);cells+=`<div class="cd ${dl?'dl':''}">${day}${dl?`<b>${aug15} форм</b>`:''}</div>`;}
  const wd=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'].map(w=>`<div class="cwd">${w}</div>`).join('');
  const groups={};D.forEach(x=>{(groups[x.d]=groups[x.d]||[]).push(x);});
  const labels={'25.07':'25 июля — самозанятые','15.08':'15 августа — основной дедлайн (910 / 200 / 300)'};
  const list=['25.07','15.08'].filter(d=>groups[d]).map(d=>`<div class="g"><div class="gh">${labels[d]}</div>${groups[d].map(x=>`<div class="it"><b>${x.f}</b><div class="who">${x.c.name}<small>ведёт ${x.c.acc} · ${x.c.regime}</small></div><span class="dl ${x.c.tone}">${x.c.dl}</span></div>`).join('')}</div>`).join('');
  document.getElementById('viewCal').innerHTML=`<h1>Календарь дедлайнов</h1>
    <div style="color:var(--dim);font-size:13.5px;margin-bottom:4px">Все сроки сдачи по всем клиентам — ни один не теряется.</div>
    <div class="calgrid2"><div class="calbox"><h3>Август 2026</h3><div class="cgrid">${wd}${cells}</div></div>
      <div class="calbox dlist"><h3>Ближайшие дедлайны</h3>${list}</div></div>`;
}
function showView(v){
  document.getElementById('viewDash').style.display=v==='dash'?'block':'none';
  document.getElementById('viewClients').style.display=v==='clients'?'flex':'none';
  document.getElementById('viewCal').style.display=v==='cal'?'block':'none';
  document.getElementById('navDash').classList.toggle('on',v==='dash');
  document.getElementById('navCli').classList.toggle('on',v==='clients');
  document.getElementById('navCal').classList.toggle('on',v==='cal');
  if(v==='dash')renderDash(); else if(v==='cal')renderCal(); else {renderList();renderDetail();}
}
renderDash();
</script>
</body></html>
